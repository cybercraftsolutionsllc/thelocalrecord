name: Manual Ingest

on:
  workflow_dispatch:
    inputs:
      municipality_slug:
        description: Municipality slug to ingest
        required: true
        default: manheimtownshippa

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'file:../../../data/manual-ingest.db' }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL != '' && vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
      INGEST_USER_AGENT: ${{ vars.INGEST_USER_AGENT != '' && vars.INGEST_USER_AGENT || 'thelocalrecord-bot/0.1 (+https://thelocalrecord.org)' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare database
        run: |
          pnpm db:push
          pnpm db:seed

      - name: Run ingest
        run: pnpm --filter @thelocalrecord/ingest ingest --slug=${{ github.event.inputs.municipality_slug }}
