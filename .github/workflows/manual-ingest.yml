name: Manual Ingest

on:
  workflow_dispatch:
    inputs:
      municipality_slug:
        description: Municipality slug to ingest
        required: true
        default: manheimtownshippa

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      INGEST_USER_AGENT: thelocalrecord-bot/0.1 (+https://thelocalrecord.org)
      MUNICIPALITY_SLUG: ${{ github.event.inputs.municipality_slug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check planning archive parsers
        env:
          DRY_RUN: "1"
        run: pnpm --filter @thelocalrecord/ingest import:planning-commission
