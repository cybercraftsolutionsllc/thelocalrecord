name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
      NEWSLETTER_REPLY_TO: ${{ secrets.NEWSLETTER_REPLY_TO }}
      NEXT_PUBLIC_SITE_URL: https://thelocalrecord.org
      NEXT_PUBLIC_CONTENT_API_BASE: https://thelocalrecord-api.cybercraftsolutions.workers.dev
      CORRECTIONS_EMAIL: cyber.craft@craftedcybersolutions.com
      INGEST_USER_AGENT: thelocalrecord-bot/0.1 (+https://thelocalrecord.org)
      ENABLE_DATABASE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate required secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub Actions secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      - name: Apply D1 schema
        run: |
          for migration in $(find apps/worker/migrations -maxdepth 1 -name '*.sql' | sort); do
            npx wrangler d1 execute thelocalrecord-prod --remote --file "$migration" --config apps/worker/wrangler.jsonc
            npx wrangler d1 execute thelocalrecord-preview --remote --file "$migration" --config apps/worker/wrangler.jsonc
          done

      - name: Upload OpenAI secret if present
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          echo "$OPENAI_API_KEY" | npx wrangler secret put OPENAI_API_KEY --config apps/worker/wrangler.jsonc --env=""

      - name: Upload newsletter secrets if present
        run: |
          if [ -n "$RESEND_API_KEY" ]; then
            echo "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY --config apps/worker/wrangler.jsonc --env=""
          fi
          if [ -n "$NEWSLETTER_FROM_EMAIL" ]; then
            echo "$NEWSLETTER_FROM_EMAIL" | npx wrangler secret put NEWSLETTER_FROM_EMAIL --config apps/worker/wrangler.jsonc --env=""
          fi
          if [ -n "$NEWSLETTER_REPLY_TO" ]; then
            echo "$NEWSLETTER_REPLY_TO" | npx wrangler secret put NEWSLETTER_REPLY_TO --config apps/worker/wrangler.jsonc --env=""
          fi

      - name: Deploy worker
        run: npx wrangler deploy --config apps/worker/wrangler.jsonc --env=""

      - name: Build static site against live worker API
        run: pnpm build:web

      - name: Deploy Pages
        run: npx wrangler pages deploy apps/web/out --project-name thelocalrecord-web --branch main --commit-hash ${{ github.sha }} --commit-message "${{ github.event.head_commit.message || 'Deploy from GitHub Actions' }}"
