name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
      NEWSLETTER_REPLY_TO: ${{ secrets.NEWSLETTER_REPLY_TO }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_SITE_URL: https://thelocalrecord.org
      NEXT_PUBLIC_CONTENT_API_BASE: https://thelocalrecord-api.cybercraftsolutions.workers.dev
      CORRECTIONS_EMAIL: cyber.craft@craftedcybersolutions.com
      INGEST_USER_AGENT: thelocalrecord-bot/0.1 (+https://thelocalrecord.org)
      ENABLE_DATABASE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate required secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub Actions secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi
      - name: Validate optional Firebase secrets
        run: |
          if [ -n "$FIREBASE_PROJECT_ID$FIREBASE_WEB_API_KEY" ] && { [ -z "$FIREBASE_PROJECT_ID" ] || [ -z "$FIREBASE_WEB_API_KEY" ]; }; then
            echo "Set both FIREBASE_PROJECT_ID and FIREBASE_WEB_API_KEY, or neither." >&2
            exit 1
          fi
          web_count=0
          for value in "$NEXT_PUBLIC_FIREBASE_API_KEY" "$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" "$NEXT_PUBLIC_FIREBASE_PROJECT_ID" "$NEXT_PUBLIC_FIREBASE_APP_ID"; do
            if [ -n "$value" ]; then
              web_count=$((web_count + 1))
            fi
          done
          if [ "$web_count" -ne 0 ] && [ "$web_count" -ne 4 ]; then
            echo "Set all NEXT_PUBLIC_FIREBASE_* web config secrets, or none." >&2
            exit 1
          fi
      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      - name: Apply D1 schema
        run: |
          npx wrangler d1 migrations apply thelocalrecord-prod --remote --config apps/worker/wrangler.jsonc
          npx wrangler d1 migrations apply thelocalrecord-preview --remote --config apps/worker/wrangler.jsonc --env preview

      - name: Upload OpenAI secret if present
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          echo "$OPENAI_API_KEY" | npx wrangler secret put OPENAI_API_KEY --config apps/worker/wrangler.jsonc --env=""

      - name: Upload Firebase secrets if present
        if: ${{ env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_WEB_API_KEY != '' }}
        run: |
          echo "$FIREBASE_PROJECT_ID" | npx wrangler secret put FIREBASE_PROJECT_ID --config apps/worker/wrangler.jsonc --env=""
          echo "$FIREBASE_WEB_API_KEY" | npx wrangler secret put FIREBASE_WEB_API_KEY --config apps/worker/wrangler.jsonc --env=""

      - name: Upload newsletter secrets if present
        run: |
          if [ -n "$RESEND_API_KEY" ]; then
            echo "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY --config apps/worker/wrangler.jsonc --env=""
          fi
          if [ -n "$NEWSLETTER_FROM_EMAIL" ]; then
            echo "$NEWSLETTER_FROM_EMAIL" | npx wrangler secret put NEWSLETTER_FROM_EMAIL --config apps/worker/wrangler.jsonc --env=""
          fi
          if [ -n "$NEWSLETTER_REPLY_TO" ]; then
            echo "$NEWSLETTER_REPLY_TO" | npx wrangler secret put NEWSLETTER_REPLY_TO --config apps/worker/wrangler.jsonc --env=""
          fi

      - name: Deploy worker
        run: npx wrangler deploy --config apps/worker/wrangler.jsonc --env=""

      - name: Build static site against live worker API
        run: pnpm build:web

      - name: Deploy Pages
        run: npx wrangler pages deploy apps/web/out --project-name thelocalrecord-web --branch main --commit-hash ${{ github.sha }} --commit-message "${{ github.event.head_commit.message || 'Deploy from GitHub Actions' }}"
