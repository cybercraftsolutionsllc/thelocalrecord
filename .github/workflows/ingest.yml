name: Ingest

on:
  workflow_dispatch:
    inputs:
      municipality_slug:
        description: Optional municipality slug
        required: false
        default: manheimtownshippa
  schedule:
    - cron: "17 * * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      CONTENT_API_BASE: https://thelocalrecord-api.cybercraftsolutions.workers.dev
      INGEST_USER_AGENT: thelocalrecord-bot/0.1 (+https://thelocalrecord.org)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Choose municipality
        id: municipality
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.municipality_slug }}" != "" ]; then
            echo "slug=${{ github.event.inputs.municipality_slug }}" >> "$GITHUB_OUTPUT"
          else
            echo "slug=manheimtownshippa" >> "$GITHUB_OUTPUT"
          fi

      - name: Run live source ingest
        run: |
          response_file="$(mktemp)"
          status_code="$(curl --show-error --silent \
            --output "$response_file" \
            --write-out "%{http_code}" \
            -X POST \
            "${CONTENT_API_BASE}/admin/run?slug=${{ steps.municipality.outputs.slug }}")"
          cat "$response_file"
          node -e "const fs=require('fs'); const path=process.argv[1]; const status=Number(process.argv[2]); const body=JSON.parse(fs.readFileSync(path,'utf8')); if (status !== 200 || body.ok !== true) { console.error('Live ingest failed.'); process.exit(1); } if (Array.isArray(body.sourceFailures) && body.sourceFailures.length > 0) { console.warn('Live ingest completed with source failures:', body.sourceFailures); }" "$response_file" "$status_code"

      - name: Import planning archive PDFs
        env:
          MUNICIPALITY_SLUG: ${{ steps.municipality.outputs.slug }}
        run: pnpm --filter @thelocalrecord/ingest import:planning-commission
