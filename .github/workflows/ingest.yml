name: Ingest

on:
  workflow_dispatch:
    inputs:
      municipality_slug:
        description: Optional municipality slug
        required: false
        default: manheimtownshippa
  schedule:
    - cron: "17 * * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'file:../../../data/ingest-actions.db' }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL != '' && vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
      INGEST_USER_AGENT: ${{ vars.INGEST_USER_AGENT != '' && vars.INGEST_USER_AGENT || 'thelocalrecord-bot/0.1 (+https://github.com/example/thelocalrecord)' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare database
        run: |
          pnpm db:push
          pnpm db:seed

      - name: Explain persistence mode
        run: |
          if [ "${{ secrets.DATABASE_URL }}" = "" ]; then
            echo "No DATABASE_URL secret set. Using ephemeral SQLite for parser validation and debug logging."
          else
            echo "Using configured DATABASE_URL secret."
          fi

      - name: Run ingest
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.municipality_slug }}" != "" ]; then
            pnpm --filter @thelocalrecord/ingest ingest --slug=${{ github.event.inputs.municipality_slug }}
          else
            pnpm ingest:run
          fi
